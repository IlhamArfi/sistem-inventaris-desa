    <script>
      let barangKIB = null;
      let asalUsulKIBA = null;
      function loadData() {
        renderDataKIBA(JSON.parse('<?= data ?>'));
        barangKIB = JSON.parse('<?= barangKIB ?>');
        asalUsulData = JSON.parse('<?= asalUsulData ?>');
        console.log(asalUsulData);
        
        const editJenisBarangSelect = document.getElementById('editJenisBarang');
        const jenisBarangSelect = document.getElementById('jenisBarang');
        // const editKodeBarangSelect = document.getElementById('editKodeBarang');
        const barangSelect = document.getElementById('barang');
        const editBarangSelect = document.getElementById('editBarang');
        barangKIB.forEach(item => {
          const option = document.createElement('option');
          option.value = item[1];
          option.textContent = item[1];
          option.setAttribute('data-kode', item[0]);
          barangSelect.appendChild(option);
        });
        barangKIB.forEach(item => {
          const option = document.createElement('option');
          option.value = item[1];
          option.textContent = item[1];
          option.setAttribute('data-kode', item[0]);
          editBarangSelect.appendChild(option);
        });

        const asalUsulSelect = document.getElementById('asalUsul');
        const editAsalUsulSelect = document.getElementById('editAsalUsul');
        asalUsulData.forEach(item => {
          const option = document.createElement('option');
          option.value = item[1];
          option.textContent = item[1];
          asalUsulSelect.appendChild(option);
        })
        asalUsulData.forEach(item => {
          const option = document.createElement('option');
          option.value = item[1];
          option.textContent = item[1];
          editAsalUsulSelect.appendChild(option);
        })

        barangSelect.addEventListener('change', function () {
          const selectedOption = this.selectedOptions[0];
          const selectedKode = selectedOption.value;
          const kelompokSelect = document.getElementById('kelompok'); 
          kelompokSelect.innerHTML = "";
          updateKelompok(selectedKode);
        });

        editBarangSelect.addEventListener('change', function () {
          const selectedOption = this.selectedOptions[0];
          const selectedKode = selectedOption.value; 
          const editKelompokSelect = document.getElementById('editKelompok'); 
          editKelompokSelect.innerHTML = "";
          updateEditKelompok(selectedKode);
        });

        
      }

      function updateEditKelompok(selectedKode) {
        const editKelompokSelect = document.getElementById('editKelompok'); 
        google.script.run.withSuccessHandler((data) => {
          console.log(data)
          data.forEach(item => {
            const option = document.createElement('option');
            option.value = item;
            option.textContent = item;
            editKelompokSelect.appendChild(option);
          })

          editKelompokSelect.addEventListener('change', function () {
            const selectedOption = this.selectedOptions[0];
            const selectedValue = selectedOption.value; 
            const editSubKelompokSelect = document.getElementById('editSubKelompok'); 
            editSubKelompokSelect.innerHTML = "";
            updateEditSubKelompok(selectedValue);
          });
          
        }).getKelompokByBarangKIB(<?= kibType ?>, selectedKode);
      }

      function updateEditSubKelompok(selectedValue) {
        const editSubKelompokSelect = document.getElementById('editSubKelompok'); 
        google.script.run.withSuccessHandler((data) => {
          console.log(data)
          data.forEach(item => {
            const option = document.createElement('option');
            option.value = item;
            option.textContent = item;
            editSubKelompokSelect.appendChild(option);
          })

          editSubKelompokSelect.addEventListener('change', function () {
            const selectedOption = this.selectedOptions[0];
            const selectedValue = selectedOption.value; 
            const editJenisBarangSelect = document.getElementById('editJenisBarang'); 
            editJenisBarangSelect.innerHTML = "";
            updateEditJenisBarang(selectedValue);
          });
          
        }).getSubKelompokByKelompokKIB(<?= kibType ?>, selectedValue);
      }

      function updateEditJenisBarang(selectedValue) {
        const editJenisBarangSelect = document.getElementById('editJenisBarang'); 
        google.script.run.withSuccessHandler((data) => {
          console.log(data)
          data.forEach(item => {
            const option = document.createElement('option');
            option.value = item.nama;
            option.textContent = item.nama;
            option.setAttribute('data-kode', item.kode);
            editJenisBarangSelect.appendChild(option);
          })

          editJenisBarangSelect.addEventListener('change', function () {
            const selectedOption = this.selectedOptions[0];
            const selectedKode = selectedOption.getAttribute('data-kode'); 
            updateEditKodeBarang(selectedKode);
          });
          
        }).getJenisBySubKelompokKIB(<?= kibType ?>, selectedValue);
      }

      function updateEditKodeBarang(jenisBarangCode) {
        const editKodeBarangSelect = document.getElementById('editKodeBarang');
        editKodeBarangSelect.value = jenisBarangCode; 
      }

      function updateKelompok(selectedKode) {
        const kelompokSelect = document.getElementById('kelompok');
        google.script.run.withSuccessHandler((data) => {
          console.log(data)
          data.forEach(item => {
            const option = document.createElement('option');
            option.value = item;
            option.textContent = item;
            kelompokSelect.appendChild(option);
          })

          kelompokSelect.addEventListener('change', function () {
            const selectedOption = this.selectedOptions[0];
            const selectedValue = selectedOption.value; 
            const subKelompokSelect = document.getElementById('subKelompok'); 
            subKelompokSelect.innerHTML = "";
            updateSubKelompok(selectedValue);
          });
          
        }).getKelompokByBarangKIB(<?= kibType ?>, selectedKode);
      }

      function updateSubKelompok(selectedValue) {
        const subKelompokSelect = document.getElementById('subKelompok');
        google.script.run.withSuccessHandler((data) => {
          console.log(data)
          data.forEach(item => {
            const option = document.createElement('option');
            option.value = item;
            option.textContent = item;
            subKelompokSelect.appendChild(option);
          })

          subKelompokSelect.addEventListener('change', function () {
            const selectedOption = this.selectedOptions[0];
            const selectedValue = selectedOption.value; 
            const jenisBarangSelect = document.getElementById('jenisBarang'); 
            jenisBarangSelect.innerHTML = "";
            updateJenisBarang(selectedValue);
          });
          
        }).getSubKelompokByKelompokKIB(<?= kibType ?>, selectedValue);
      }

      function updateJenisBarang(selectedValue) {
        const jenisBarangSelect = document.getElementById('jenisBarang');
        google.script.run.withSuccessHandler((data) => {
          console.log(data)
          data.forEach(item => {
            const option = document.createElement('option');
            option.value = item.nama;
            option.textContent = item.nama;
            option.setAttribute('data-kode', item.kode);
            jenisBarangSelect.appendChild(option);
          })

          jenisBarangSelect.addEventListener('change', function () {
            const selectedOption = this.selectedOptions[0];
            const selectedKode = selectedOption.getAttribute('data-kode'); 
            updateKodeBarang(selectedKode);
          });
          
        }).getJenisBySubKelompokKIB(<?= kibType ?>, selectedValue);
      }

      function updateKodeBarang(jenisBarangCode) {
        const kodeBarangSelect = document.getElementById('kodeBarang');
        kodeBarangSelect.value = jenisBarangCode; 
      }

      function renderDataKIBA(data) {
        const table = $('#kibaTable').DataTable({
                      responsive: true,
                      lengthMenu: [5, 10, 25, 50],
                      searching: true,
                      paging: true,
                      destroy: true,
                      scrollX: true,
                      columnDefs: [
                        {
                          targets: 1, // Kolom "Jenis Barang"
                          render: function (data, type, row) {
                            return `<span title="${data}">${data.substring(0, 20)}...</span>`;
                          },
                        },
                      ],
                    });

        table.clear();

        // Menambahkan data ke tabel
        data.forEach((item) => {
          table.row.add([
            item.no,
            item.jenis_barang,
            item.kode_barang,
            item.register,
            item.tanggal_pengadaan,
            item.asal_usul,
            item.letak,
            item.kondisi,
            item.no_sertifikat,
            item.luas_m2,
            item.harga_per_meter,
            item.jumlah_harga,
            item.keterangan,
            item.last_update,
            `
            <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#editKIBAForm" onclick="editData(${item.no})">
              <i class="fa fa-pen-to-square"></i> 
            </button>
            <button class="btn btn-danger btn-sm" onclick="deleteData(${item.no})">
              <i class="fa fa-trash"></i> 
            </button>
            `,
          ]);
        });

        table.draw();

        // Event listener untuk toggle kolom
        $('#applyFilterBtn').on('click', function() {
          const table = $('#kibaTable').DataTable();  // Menyimpan referensi ke tabel

          // Menyembunyikan atau menampilkan kolom berdasarkan checkbox
          $('.toggle-column').each(function() {
            const column = table.column($(this).val());
            if ($(this).prop('checked')) {
              column.visible(true); // Tampilkan kolom
            } else {
              column.visible(false); // Sembunyikan kolom
            }
          });

          // Menutup modal setelah filter diterapkan
          $('#filterModal').modal('hide');
        });
      }


      // Submit new data
      function submitAddForm(event) {
        event.preventDefault(); // Mencegah form untuk submit secara default

        // Ambil data dari form
        const jenisBarang = document.getElementById('jenisBarang').value;
        const kodeBarang = document.getElementById('kodeBarang').value;
        const jumlahBarang = document.getElementById('jumlahBarang').value;
        const asalUsul = document.getElementById('asalUsul').value;
        const luasM2 = document.getElementById('luasM2').value;
        const keterangan = document.getElementById('keterangan').value;
        const tanggalPengadaan = document.getElementById('tanggalPengadaan').value;
        const tanggalPenerimaan = document.getElementById('tanggalPenerimaan').value;
        const letak = document.getElementById('letak').value;
        const kondisi = document.getElementById('kondisi').value;
        const noSertifikat = document.getElementById('noSertifikat').value;
        const hargaPerMeter = document.getElementById('hargaPerMeter').value;
        const jumlahHarga = document.getElementById('jumlahHarga').value;
        const penggunaan = document.getElementById('penggunaan').value;

        // Validasi sederhana
        if (!jenisBarang || !kodeBarang || !jumlahBarang || !asalUsul || !luasM2 || !keterangan || !tanggalPengadaan || !tanggalPenerimaan || !letak || !kondisi || !noSertifikat || !hargaPerMeter || !jumlahHarga) {
          alert('Semua field harus diisi!');
          return;
        }

        // Kirim data ke backend menggunakan google.script.run
        google.script.run.withSuccessHandler((data) => {
          renderDataKIBA(JSON.parse(data));
          // Reset form setelah sukses
          document.getElementById('addKibaForm').reset();
          // Tutup modal setelah sukses
          const addModal = bootstrap.Modal.getInstance(document.getElementById('addModal'));
          addModal.hide();
          // Panggil fungsi untuk memuat data barang setelah berhasil menambahkan data
          
        }).addKIBA({
          jenis_barang: jenisBarang,
          kode_barang: kodeBarang,
          jumlah_barang: jumlahBarang,
          asal_usul: asalUsul,
          luas_m2: luasM2,
          keterangan: keterangan,
          tanggal_pengadaan: tanggalPengadaan,
          tanggal_penerimaan: tanggalPenerimaan,
          letak: letak,
          penggunaan: penggunaan,
          kondisi: kondisi,
          nomer_sertifikat: noSertifikat,
          harga_per_meter: hargaPerMeter,
          jumlah_harga: jumlahHarga
        }, <?= modelType ?>);
      }

      function editData(no) {
        document.getElementById('editKIBAForm').dataset.no = no;
        google.script.run.withSuccessHandler((data) => {
          const parsedData = JSON.parse(data);
          console.log(parsedData);
          // Isi data ke dalam form edit
          const selectElement = document.getElementById('editJenisBarang');
          for (let i = 0; i < selectElement.options.length; i++) {
            const option = selectElement.options[i];

            // Jika nilai opsi sama dengan nilai yang dicari, pilih opsi tersebut
            if (option.value === parsedData[1]) {
              selectElement.selectedIndex = i;
              break;
            }
          }
          // document.getElementById('editJenisBarang').value = parsedData[1];
          document.getElementById('editKodeBarang').value = parsedData[2];
          document.getElementById('editRegister').value = parsedData[3];
          document.getElementById('editTanggalPengadaan').value = new Date(parsedData[4]).toISOString().split('T')[0];
          document.getElementById('editTanggalPenerimaan').value = new Date(parsedData[5]).toISOString().split('T')[0];
          const asalUsulElement = document.getElementById('editAsalUsul');
          for (let i = 0; i < asalUsulElement.options.length; i++) {
            const option = asalUsulElement.options[i];

            // Jika nilai opsi sama dengan nilai yang dicari, pilih opsi tersebut
            if (option.value === parsedData[6]) {
              asalUsulElement.selectedIndex = i;
              break;
            }
          }
          // document.getElementById('editAsalUsul').value = parsedData[6];
          document.getElementById('editLetak').value = parsedData[7];
          document.getElementById('editPenggunaan').value = parsedData[8];
          document.getElementById('editKondisi').value = parsedData[9];
          document.getElementById('editNoSertifikat').value = parsedData[10];
          document.getElementById('editLuasM2').value = parsedData[11];
          document.getElementById('editHargaPerMeter').value = parsedData[12];
          document.getElementById('editJumlahHarga').value = parsedData[13];
          document.getElementById('editKeterangan').value = parsedData[14];

          // Tampilkan modal edit
          const editModal = bootstrap.Modal.getInstance(document.getElementById('editKIBAForm'));
          editModal.show();

        }).getKIBAbyNo(no,<?= modelType ?>);
      }

      function submitEditForm(event) {
        const no = document.getElementById('editKIBAForm').dataset.no;
        event.preventDefault();

        const data = {
          no: no,
          jenis_barang: document.getElementById('editJenisBarang').value,
          kode_barang: document.getElementById('editKodeBarang').value,
          tanggal_pengadaan: document.getElementById('editTanggalPengadaan').value,
          tanggal_penerimaan: document.getElementById('editTanggalPenerimaan').value,
          asal_usul: document.getElementById('editAsalUsul').value,
          letak: document.getElementById('editLetak').value,
          penggunaan: document.getElementById('editPenggunaan').value,
          kondisi: document.getElementById('editKondisi').value,
          nomer_sertifikat: document.getElementById('editNoSertifikat').value,
          luas_m2: document.getElementById('editLuasM2').value,
          harga_per_meter: document.getElementById('editHargaPerMeter').value,
          jumlah_harga: document.getElementById('editJumlahHarga').value,
          keterangan: document.getElementById('editKeterangan').value,
        };

        google.script.run.withSuccessHandler((data) => {
          const editModal = bootstrap.Modal.getInstance(document.getElementById('editKIBAForm'));
          editModal.hide();
          renderDataKIBA(JSON.parse(data));
        }).updateKIBA(data, <?= modelType ?>); // Panggil server-side untuk menyimpan data
      }

      function deleteData(no) {
        const confirmed = confirm(`Are you sure you want to delete No: ${no}?`);
        if (confirmed) {
          google.script.run.withSuccessHandler((data) => {
            renderDataKIBA(JSON.parse(data));
          }).deleteKIBA(no, <?= modelType ?>);
        }
      }

      window.onload = function () {
          loadData();
      };
      
      document.addEventListener('DOMContentLoaded', function () {
        const hargaPerMeterInput = document.getElementById('hargaPerMeter');
        const luasM2Input = document.getElementById('luasM2');
        const jumlahHargaInput = document.getElementById('jumlahHarga');

        // Fungsi untuk menghitung jumlah harga
        function hitungJumlahHarga() {
          const hargaPerMeter = parseFloat(hargaPerMeterInput.value) || 0; // Default ke 0 jika kosong
          const luasM2 = parseFloat(luasM2Input.value) || 0; // Default ke 0 jika kosong

          // Hitung hasil perkalian
          const jumlahHarga = hargaPerMeter * luasM2;

          // Isi ke input jumlahHarga
          jumlahHargaInput.value = jumlahHarga.toFixed(2); 
        }

        // Tambahkan event listener pada kedua input untuk menghitung ulang ketika salah satu berubah
        hargaPerMeterInput.addEventListener('input', hitungJumlahHarga);
        luasM2Input.addEventListener('input', hitungJumlahHarga);
      });
    </script>
  </head>

    <div class="modal fade" id="addModal" tabindex="-1" aria-labelledby="addModalLabel" aria-hidden="true">

                    <label for="kelompok" class="form-label">Kelompok</label>

                  <div class="mb-3">
                    <label for="subKelompok" class="form-label">Sub Kelompok</label>

                  </div>
