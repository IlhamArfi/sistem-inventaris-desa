<!DOCTYPE html>
<html lang="en">

<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <?!= include('style'); ?>
</head>

<body id="bodybackground">
  <!-- Navbar -->
  <?!= include('NavBar'); ?>

  <!-- End Navbar -->

  <!-- Konten Halaman -->
  <div class="container mt-4">
    <h1>Welcome to the Dashboard</h1>
    <p>Overview of data from various models.</p>
    <div class="row">
      <!-- Card untuk Summary -->
      <div class="col-md-4">
        <div class="card" id="info">
          <div class="card-body">
            <h5 class="card-title">Jumlah KIB-A</h5>
            <p class="card-text" id="kibACount">Loading...</p>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card" id="info">
          <div class="card-body">
            <h5 class="card-title">Jumlah KIB-B</h5>
            <p class="card-text" id="kibBCount">Loading...</p>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card" id="info">
          <div class="card-body">
            <h5 class="card-title">Jumlah KIB-C</h5>
            <p class="card-text" id="kibCCount">Loading...</p>
          </div>
        </div>
      </div>
    </div>

    <div class="row mt-3">
      <div class="col-md-4">
        <div class="card" id="info">
          <div class="card-body">
            <h5 class="card-title">Jumlah KIB-D</h5>
            <p class="card-text" id="kibDCount">Loading...</p>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card" id="info">
          <div class="card-body">
            <h5 class="card-title">Jumlah KIB-E</h5>
            <p class="card-text" id="kibECount">Loading...</p>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card" id="info">
          <div class="card-body">
            <h5 class="card-title">Jumlah KIB-F</h5>
            <p class="card-text" id="kibFCount">Loading...</p>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- Tambahkan script untuk Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Fungsi untuk mengambil data summary dari Google Apps Script
    function fetchSummaryData() {
      google.script.run.withSuccessHandler(function(data) {
        document.getElementById("kibACount").innerText = data.kibACount;
        document.getElementById("kibBCount").innerText = data.kibBCount;
        document.getElementById("kibCCount").innerText = data.kibCCount;
        document.getElementById("kibDCount").innerText = data.kibDCount;
        document.getElementById("kibECount").innerText = data.kibECount;
        document.getElementById("kibFCount").innerText = data.kibFCount;
      }).getSummaryData();
    }

    // Memanggil fungsi fetchSummaryData setelah halaman dimuat
    window.onload = function() {
      fetchSummaryData();
    };
  </script>

</body>
</html>
