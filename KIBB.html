            option.textContent = item;

            })

            const selectedOption = this.selectedOptions[0];

              option.value = item;
              option.textContent = item;
              kelompokSelect.appendChild(option);
              })

              kelompokSelect.addEventListener('change', function () {

              const selectedValue = selectedOption.value;

        function updateSubKelompok(selectedValue) {

            option.textContent = item;
            subKelompokSelect.appendChild(option);
            })

            const selectedOption = this.selectedOptions[0];
            const selectedValue = selectedOption.value; 
            const jenisBarangSelect = document.getElementById('jenisBarang'); 
            jenisBarangSelect.innerHTML = "";

            });

        function updateJenisBarang(selectedValue) {
        const jenisBarangSelect = document.getElementById('jenisBarang');
        google.script.run.withSuccessHandler((data) => {
            console.log(data)

            option.value = item.nama;

            option.setAttribute('data-kode', item.kode);

            })

            const selectedOption = this.selectedOptions[0];
            const selectedKode = selectedOption.getAttribute('data-kode'); 
            updateKodeBarang(selectedKode);
            });
            
        }).getJenisBySubKelompokKIB(<?= kibType ?>, selectedValue);

      function updateKodeBarang(jenisBarangCode) {
        const kodeBarangSelect = document.getElementById('kodeBarang');
        kodeBarangSelect.value = jenisBarangCode; 
      }

      function renderDataKIBB(data) {
        const table = $('#kibbTable').DataTable({
                      responsive: true,
                      lengthMenu: [5, 10, 25, 50],
                      searching: true,
                      paging: true,
                      destroy: true,
                      scrollX: true,
                    });

        table.clear();

        // Menambahkan data ke tabel
        data.forEach((item) => {
          console.log(item);
          table.row.add([
            item.no,
            item.kode_barang,
            item.jenis_barang,
            item.register,
            new Date(item.tanggal_pengadaan).toISOString().split('T')[0],
            new Date(item.tanggal_penerimaan).toISOString().split('T')[0],
            item.merk,
            item.type,
            item.ukuran,
            item.bahan,
            item.no_pabrik,
            item.no_rangka,
            item.no_mesin,
            item.no_polisi,
            item.no_bpkb,
            item.kondisi,
            item.asal_usul,
            item.harga,
            item.keterangan,
            new Date(item.last_update).toISOString().split('T')[0],
            `
            <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#editKIBBForm" onclick="editData(${item.no})">
              <i class="fa fa-pen-to-square"></i> 
            </button>
            <button class="btn btn-danger btn-sm" onclick="deleteData(${item.no})">
              <i class="fa fa-trash"></i> 
            </button>
            `,
          ]);
        });

        table.draw();

        // Event listener untuk toggle kolom
        $('#applyFilterBtn').on('click', function() {
          const table = $('#kibbTable').DataTable();  // Menyimpan referensi ke tabel

          // Menyembunyikan atau menampilkan kolom berdasarkan checkbox
          $('.toggle-column').each(function() {
            const column = table.column($(this).val());
            if ($(this).prop('checked')) {
              column.visible(true); // Tampilkan kolom
            } else {
              column.visible(false); // Sembunyikan kolom
            }
          });

          // Menutup modal setelah filter diterapkan
          $('#filterModal').modal('hide');
        });
      }


      // Submit new data
      function submitAddForm(event) {
        event.preventDefault(); // Mencegah form untuk submit secara default

        // Ambil data dari form
        const data = {
          jenis_barang: document.getElementById('jenisBarang').value,
          kode_barang: document.getElementById('kodeBarang').value,
          jumlah_barang: document.getElementById('jumlahBarang').value,
          tanggal_pengadaan: document.getElementById('tanggalPengadaan').value,
          tanggal_penerimaan: document.getElementById('tanggalPenerimaan').value,
          merk: document.getElementById('merk').value,
          type: document.getElementById('type').value,
          ukuran: document.getElementById('ukuran').value,
          bahan: document.getElementById('bahan').value,
          no_pabrik: document.getElementById('noPabrik').value,
          no_rangka: document.getElementById('noRangka').value,
          no_mesin: document.getElementById('noMesin').value,
          no_polisi: document.getElementById('noPolisi').value,
          no_bpkb: document.getElementById('noBpkb').value,
          kondisi: document.getElementById('kondisi').value,
          harga: document.getElementById('harga').value,
          asal_usul: document.getElementById('asalUsul').value,
          kondisi: document.getElementById('kondisi').value,
          keterangan: document.getElementById('keterangan').value,
        };

        // Validasi sederhana
        if (Object.values(data).some((value) => !value)) {
          alert('Semua field harus diisi!');
          return;
        }

        // Kirim data ke backend menggunakan google.script.run
        google.script.run.withSuccessHandler((data) => {
          renderDataKIBB(JSON.parse(data));
          // Reset form setelah sukses
          document.getElementById('addKibbForm').reset();
          // Tutup modal setelah sukses
          const addModal = bootstrap.Modal.getInstance(document.getElementById('addModal'));
          addModal.hide();
          // Panggil fungsi untuk memuat data barang setelah berhasil menambahkan data
          
        }).addKIBB(data, <?= modelType ?>);
      }

      function editData(no) {
        document.getElementById('editKIBBForm').dataset.no = no;
        google.script.run.withSuccessHandler((data) => {
          const parsedData = JSON.parse(data);
          // Isi data ke dalam form edit
          const selectElement = document.getElementById('editJenisBarang');
          for (let i = 0; i < selectElement.options.length; i++) {
            const option = selectElement.options[i];

            // Jika nilai opsi sama dengan nilai yang dicari, pilih opsi tersebut
            if (option.value === parsedData[2]) {
              selectElement.selectedIndex = i;
              break;
            }
          }
          // document.getElementById('editJenisBarang').value = parsedData[1];
          document.getElementById('editKodeBarang').value = parsedData[1];
          document.getElementById('editRegister').value = parsedData[3];
          document.getElementById('editTanggalPengadaan').value = new Date(parsedData[4]).toISOString().split('T')[0];
          document.getElementById('editTanggalPenerimaan').value = new Date(parsedData[5]).toISOString().split('T')[0];
          const asalUsulElement = document.getElementById('editAsalUsul');
          for (let i = 0; i < asalUsulElement.options.length; i++) {
            const option = asalUsulElement.options[i];

            // Jika nilai opsi sama dengan nilai yang dicari, pilih opsi tersebut
            if (option.value === parsedData[16]) {
              asalUsulElement.selectedIndex = i;
              break;
            }
          }
          document.getElementById('editMerk').value = parsedData[6];
          document.getElementById('editType').value = parsedData[7];
          document.getElementById('editUkuran').value = parsedData[8];
          document.getElementById('editBahan').value = parsedData[9];
          document.getElementById('editNoPabrik').value = parsedData[10];
          document.getElementById('editNoRangka').value = parsedData[11];
          document.getElementById('editNoMesin').value = parsedData[12];
          document.getElementById('editNoPolisi').value = parsedData[13];
          document.getElementById('editNoBpkb').value = parsedData[14];
          document.getElementById('editKondisi').value = parsedData[15];
          document.getElementById('editHarga').value = parsedData[17];
          document.getElementById('editKeterangan').value = parsedData[18];

          // Tampilkan modal edit
          const editModal = bootstrap.Modal.getInstance(document.getElementById('editKIBBForm'));
          editModal.show();

        }).getKIBBbyNo(no,<?= modelType ?>);
      }

      function submitEditForm(event) {
        const no = document.getElementById('editKIBBForm').dataset.no;
        event.preventDefault();

        const data = {
          no: no,
          jenis_barang: document.getElementById('editJenisBarang').value,
          kode_barang: document.getElementById('editKodeBarang').value,
          tanggal_pengadaan: document.getElementById('editTanggalPengadaan').value,
          tanggal_penerimaan: document.getElementById('editTanggalPenerimaan').value,
          asal_usul: document.getElementById('editAsalUsul').value,
          merk: document.getElementById('editMerk').value,
          type: document.getElementById('editType').value,
          ukuran: document.getElementById('editUkuran').value,
          bahan: document.getElementById('editBahan').value,
          no_pabrik: document.getElementById('editNoPabrik').value,
          no_rangka: document.getElementById('editNoRangka').value,
          no_mesin: document.getElementById('editNoMesin').value,
          no_polisi: document.getElementById('editNoPolisi').value,
          no_bpkb: document.getElementById('editNoBpkb').value,
          kondisi: document.getElementById('editKondisi').value,
          harga: document.getElementById('editHarga').value,
          keterangan: document.getElementById('editKeterangan').value,
        };

        google.script.run.withSuccessHandler((data) => {
          const editModal = bootstrap.Modal.getInstance(document.getElementById('editKIBBForm'));
          editModal.hide();
          renderDataKIBB(JSON.parse(data));
        }).updateKIBB(data, <?= modelType ?>); 
      }

      function deleteData(no) {
        const confirmed = confirm(`Are you sure you want to delete No: ${no}?`);
        if (confirmed) {
          google.script.run.withSuccessHandler((data) => {
            renderDataKIBB(JSON.parse(data));
          }).deleteKIBB(no, <?= modelType ?>);
        }
      }

      window.onload = function () {
          loadData();
      };
      
      document.addEventListener('DOMContentLoaded', function () {
        const hargaPerMeterInput = document.getElementById('hargaPerMeter');
        const luasM2Input = document.getElementById('luasM2');
        const jumlahHargaInput = document.getElementById('jumlahHarga');

        // Fungsi untuk menghitung jumlah harga
        function hitungJumlahHarga() {
          const hargaPerMeter = parseFloat(hargaPerMeterInput.value) || 0; // Default ke 0 jika kosong
          const luasM2 = parseFloat(luasM2Input.value) || 0; // Default ke 0 jika kosong

          // Hitung hasil perkalian
          const jumlahHarga = hargaPerMeter * luasM2;

          // Isi ke input jumlahHarga
          jumlahHargaInput.value = jumlahHarga.toFixed(2); 
        }

        // Tambahkan event listener pada kedua input untuk menghitung ulang ketika salah satu berubah
        hargaPerMeterInput.addEventListener('input', hitungJumlahHarga);
        luasM2Input.addEventListener('input', hitungJumlahHarga);
      });
    </script>
